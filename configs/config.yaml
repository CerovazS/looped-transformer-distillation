defaults:
  - data: trajectory
  - teacher: mock
  - student: small
  - loss: p0
  - eval_quality: default
  - trainer: default
  - _self_
  - experiment: local

seed: 17
run_id: ${now:%Y%m%d_%H%M%S}
pipeline_name: loopdistill
output_dir: outputs/${pipeline_name}/${run_id}

paths:
  manifest_path: outputs/trajectories/mock/manifest.jsonl

extraction:
  source: synthetic
  dataset_path: null
  dataset_id: synthetic-smoke
  dataset_config_name: null
  cache_dir: null
  split: train
  text_column: text
  batch_size: 16
  seq_len: 24
  num_samples: 16
  depths: null
  shuffle: true
  max_text_chars: 200000

tokenization:
  output_dir: /workspace/loopdistill_tokens/fineweb_edu_attractor140_s512
  dataset_path: null
  dataset_id: HuggingFaceFW/fineweb-edu
  dataset_config_name: sample-10BT
  cache_dir: /workspace/.cache/huggingface
  tokenizer_dir: /workspace/external/models/attractor-140m
  text_column: text
  train_split: train[:98%]
  val_split: train[98%:99%]
  test_split: train[99%:]
  batch_size: 64
  seq_len: 512
  train_samples: 8192
  val_samples: 512
  test_samples: 512
  seed_offset: 0
  shuffle: true
  max_text_chars: 200000

live:
  enabled: false
  depths: null

mode: train
