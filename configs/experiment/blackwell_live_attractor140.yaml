# @package _global_
name: blackwell_live_attractor140
run_id: live_attractor140_fineweb_${now:%Y%m%d_%H%M%S}
output_dir: outputs/live_distill/${run_id}

defaults:
  - override /data: live_text
  - override /teacher: attractor

live:
  enabled: true
  depths: [0, 1, 2]

student:
  latent_dim: 1024
  hidden_dim: 128
  num_layers: 1
  num_heads: 8
  vocab_size: 32768
  max_seq_len: 2048

loss:
  endpoint_kl_weight: 0.0
  rollout_steps: 2

eval_quality:
  enabled: true
  projections:
    - student_head
    - teacher_head
  top_k: 5
  temperature: 1.0
  rollout_steps: 2
  every_n_epochs: 1
  run_on_test: true

data:
  batch_size: 1
  seq_len: 16
  train_samples: 2
  val_samples: 1
  test_samples: 1

teacher:
  max_depth: 2
  return_logits: false
  logit_depths: final

trainer:
  max_epochs: 1
  accelerator: gpu
  devices: 1
  precision: bf16-mixed
  limit_train_batches: 2
  limit_val_batches: 1
  limit_test_batches: 1
  enable_checkpointing: false
